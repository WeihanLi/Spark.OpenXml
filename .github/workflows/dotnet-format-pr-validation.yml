name: dotnet-format-validation

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET SDK
      uses: WeihanLi/dotnet-install@v0.2.0
      with:
        version: |
            10.0.x
    - name: build
      run: dotnet build
    - name: check format
      run: dotnet format --verify-no-changes
