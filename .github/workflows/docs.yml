name: docs

on:
  push:
    branches:
      - "main"
      - "master"
      - "dev"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in progress and the latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: "publish docs"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Check out the branch that triggered this workflow to the 'source' subdirectory
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: WeihanLi/dotnet-install@v0.2.0
        with:
          version: |
            10.0.x
      - name: install dotnet tools
        run: |
          dotnet tool install -g dotnet-execute
          dotnet tool install -g docfx
      # Run a build
      - name: Build docs
        run: |
          dotnet-exec info
          dotnet build
          cp ./README.md ./docs/index.md
          docfx ./docs/docfx.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
